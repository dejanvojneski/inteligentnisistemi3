<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <title>Fake News Detector 🚀</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >
    <style>
        body {
            background-color: #f0f2f5;
            padding-top: 50px;
        }
        .card {
            max-width: 700px;
            margin: auto;
        }
        .btn-primary {
            background-color: #6f42c1;
            border: none;
        }
        .result {
            font-weight: bold;
            font-size: 1.3rem;
        }
        .confidence {
            color: #0d6efd;
        }
        .explanation {
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card p-4 shadow-sm">
        <h2 class="mb-4 text-center">Fake News Detector</h2>
        <form method="POST">
            <div class="mb-3">
                <label for="news_text" class="form-label">Внеси текст:</label>
                <textarea class="form-control" id="news_text" name="news_text" rows="4">{{ input_text }}</textarea>
            </div>
            <div class="mb-3">
                <label for="news_link" class="form-label">Или внеси линк:</label>
                <input type="text" class="form-control" id="news_link" name="news_link" placeholder="https://example.com/article">
            </div>
            <button type="submit" class="btn btn-primary w-100">Анализирај</button>
        </form>

        {% if result %}
        <hr>
        <p class="result">Резултат: {{ result|capitalize }}</p>
        <p class="confidence">Сигурност: {{ confidence }}</p>
        <p class="explanation">{{ explanation }}</p>
        {% endif %}
    </div>
</div>
<form method="POST">
    <textarea name="news" placeholder="Внеси вест или линк тука..."></textarea>

    <button type="submit">Анализирај</button>
</form>
</body>
</html>
